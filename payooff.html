<div id="amardeep-calculators" style="font-family:Arial,sans-serif;max-width:1100px;margin:0 auto;color:#111827;">
  <style>
    #amardeep-calculators *{box-sizing:border-box}
    #amardeep-calculators .hero{background:#0f172a;color:#fff;padding:16px 20px;border-radius:16px;margin-bottom:16px;text-align:center;font-weight:700}
    #amardeep-calculators .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    #amardeep-calculators .tab-btn{padding:10px 14px;border:1px solid #cbd5e1;border-radius:999px;background:#fff;cursor:pointer;font-weight:700}
    #amardeep-calculators .tab-btn.active{background:#0f172a;color:#fff;border-color:#0f172a}
    #amardeep-calculators .panel{display:none}
    #amardeep-calculators .panel.active{display:block}
    #amardeep-calculators .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
    #amardeep-calculators .card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:18px;margin-bottom:16px}
    #amardeep-calculators .dark{background:#0f172a;color:#fff;border-color:#0f172a}
    #amardeep-calculators .title{font-size:22px;font-weight:800;margin:0 0 14px}
    #amardeep-calculators .sub{font-size:12px;letter-spacing:.08em;text-transform:uppercase;opacity:.8;margin-bottom:8px}
    #amardeep-calculators .big{font-size:42px;font-weight:800;line-height:1.1}
    #amardeep-calculators .fields{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    #amardeep-calculators .full{grid-column:1/-1}
    #amardeep-calculators label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
    #amardeep-calculators input,#amardeep-calculators select{width:100%;padding:11px 12px;border:1px solid #cbd5e1;border-radius:12px;font-size:14px}
    #amardeep-calculators .row{display:flex;gap:8px}
    #amardeep-calculators .mini{width:90px}
    #amardeep-calculators .quick{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    #amardeep-calculators .quick button{padding:8px 12px;border:1px solid #cbd5e1;border-radius:999px;background:#fff;cursor:pointer;font-weight:700;transition:all .2s ease}
    #amardeep-calculators .quick button.active{background:#0f172a;color:#fff;border-color:#0f172a}
    #amardeep-calculators .quick button:hover{transform:translateY(-1px)}
    #amardeep-calculators .helper{font-size:13px;color:#166534;margin-top:8px;font-weight:700}
    #amardeep-calculators .note{font-size:13px;color:#64748b;margin-top:8px}
    #amardeep-calculators .result-row{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid #f1f5f9;font-size:14px}
    #amardeep-calculators .result-row:last-child{border-bottom:0}
    #amardeep-calculators .compare{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    #amardeep-calculators .soft{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:14px}
    #amardeep-calculators .green{background:#ecfdf5;border:1px solid #bbf7d0;border-radius:14px;padding:14px;margin-top:12px}
    #amardeep-calculators .blue{background:#eff6ff;border:1px solid #bfdbfe;border-radius:14px;padding:14px;margin-top:12px}
    #amardeep-calculators .alert-good{background:#ecfdf5;border:1px solid #86efac;color:#166534;border-radius:14px;padding:14px;margin-top:12px;font-weight:800}
    #amardeep-calculators .alert-mid{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:14px;padding:14px;margin-top:12px;font-weight:800}
    #amardeep-calculators .alert-high{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:14px;padding:14px;margin-top:12px;font-weight:800}
    #amardeep-calculators .lead{border:2px solid #0f172a}
    #amardeep-calculators .cta{display:flex;gap:10px;flex-wrap:wrap}
    #amardeep-calculators .btn{padding:12px 16px;border:none;border-radius:12px;background:#0f172a;color:#fff;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block}
    @media (max-width:900px){
      #amardeep-calculators .grid,
      #amardeep-calculators .fields,
      #amardeep-calculators .compare{grid-template-columns:1fr}
      #amardeep-calculators .big{font-size:34px}
    }
  </style>

  <div class="hero">Rates from 30+ lenders — we shop for you. Same-Day Pre-Approval Available.</div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="conv">Conventional</button>
    <button class="tab-btn" data-tab="fha">FHA</button>
    <button class="tab-btn" data-tab="va">VA</button>
    <button class="tab-btn" data-tab="aff">Affordability</button>
    <button class="tab-btn" data-tab="dti">DTI%</button>
    <button class="tab-btn" data-tab="dscr">DSCR</button>
    <button class="tab-btn" data-tab="refi">Refinance</button>
    <button class="tab-btn" data-tab="buydown">Rate Buydown</button>
    <button class="tab-btn" data-tab="payoff">Payoff Sooner</button>
    <button class="tab-btn" data-tab="goal">Personal Goal</button>
  </div>

  <div id="conv" class="panel active"></div>
  <div id="fha" class="panel"></div>
  <div id="va" class="panel"></div>
  <div id="aff" class="panel"></div>
  <div id="dti" class="panel"></div>
  <div id="dscr" class="panel"></div>
  <div id="refi" class="panel"></div>
  <div id="buydown" class="panel"></div>
  <div id="payoff" class="panel"></div>
  <div id="goal" class="panel"></div>

  <script>
    (function(){
      const terms=[30,25,20,15,10,5];

      const state={
        conv:{price:300000,term:30,down:5,downType:'%',rate:6.5,mi:0.5,hoa:0,useDefaults:true,taxes:3750,ins:780,email:''},
        fha:{price:300000,term:30,down:3.5,downType:'%',rate:6.25,mip:0.55,hoa:0,useDefaults:true,taxes:3750,ins:780,email:''},
        va:{price:350000,term:30,down:0,downType:'$',rate:6.0,hoa:0,firstUse:'yes',service:'regular',useDefaults:true,taxes:4375,ins:910,email:''},
        aff:{income:180000,debts:500,down:40000,rate:6.5,term:30,dti:45,useDefaults:true,taxes:4500,ins:1800,email:''},
        dti:{price:500000,term:30,down:5,downType:'%',rate:6.5,hoa:0,useDefaults:true,taxes:6250,ins:1300,loanType:'conv',pmiRate:0.50,fhaMip:0.55,income1:9000,income2:0,income3:0,creditCards:150,carPayments:650,studentLoans:0,otherDebts:0},
        dscr:{price:450000,term:30,down:30,downType:'%',rate:6.125,hoa:0,rent:3100,useDefaults:true,taxes:5625,ins:1170,email:''},
        refi:{currentLoan:400000,currentRate:7.25,currentMonths:360,year:2024,newLoan:405000,newRate:6.125,newMonths:360,fees:5000,email:''},
        buydown:{price:500000,down:20,downType:'%',term:30,noteRate:6.5,hoa:0,option:'2-1',useDefaults:true,taxes:6250,ins:1300},
        payoff:{loanAmount:400000,rate:6.5,term:30,extraPayment:300,payEveryTwoWeeks:'yes'},
        goal:{startMonth:'2020-01',currentBalance:400000,rate:6.5,term:30,targetMonth:'2030-07'}
      };

      function q(s,root=document){return root.querySelector(s)}
      function qa(s,root=document){return Array.from(root.querySelectorAll(s))}
      function clamp(n,min=0){n=Number(n);return Number.isFinite(n)?Math.max(min,n):min}
      function currency(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number.isFinite(n)?n:0)}
      function money2(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(Number.isFinite(n)?n:0)}
      function percent(n){return (Number.isFinite(n)?n:0).toFixed(2)+'%'}
      function mp(principal,annualRate,years){
        const p=clamp(principal), r=clamp(annualRate)/100/12, n=clamp(years)*12;
        if(!n)return 0;
        if(r===0)return p/n;
        return (p*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1)
      }
      function miMonthly(loan,annualRate){return clamp(loan)*clamp(annualRate)/100/12}
      function amortizationBalance(principal, annualRate, termMonths, monthsPaid){
        const r=clamp(annualRate)/100/12,n=clamp(termMonths),m=Math.min(clamp(monthsPaid),n);
        if(!n)return 0;
        if(r===0)return principal*(1-m/n);
        const payment=mp(principal,annualRate,n/12);
        return principal*Math.pow(1+r,m)-payment*((Math.pow(1+r,m)-1)/r)
      }
      function downAmt(price, down, type){return type==='%'?clamp(price)*clamp(down)/100:clamp(down)}
      function rr(label,val){return `<div class="result-row"><span>${label}</span><strong>${val}</strong></div>`}

      function calcAnnualTaxes(price){return clamp(price) * 0.0125}
      function calcAnnualInsurance(price){return clamp(price) * 0.0026}

      function getAnnualTaxes(tab){
        const s=state[tab];
        return s.useDefaults ? calcAnnualTaxes(s.price) : clamp(s.taxes);
      }

      function getAnnualInsurance(tab){
        const s=state[tab];
        return s.useDefaults ? calcAnnualInsurance(s.price) : clamp(s.ins);
      }

      function getMonthlyTaxes(tab){ return getAnnualTaxes(tab)/12; }
      function getMonthlyInsurance(tab){ return getAnnualInsurance(tab)/12; }

      function leadBlock(key){
        return `<div class="card lead"><div style="font-size:16px;font-weight:800;margin-bottom:6px">Get exact rate options in 2 minutes</div><div class="note" style="margin-top:0;margin-bottom:10px">No obligation • Same-day pre-approval available • 25+ years experience</div><div class="cta"><a class="btn" href="tel:+19167122735">Call 916-712-2735</a><a class="btn" href="sms:+19167122735?body=Hi%20Amardeep,%20I%20just%20used%20your%20mortgage%20calculator%20and%20would%20like%20rate%20options.">Text 916-712-2735</a></div><div class="note">We’ll move you to your contact form and pre-fill your message so you can submit in seconds.</div></div>`
      }

      function quickButtons(key, values){
        const s=state[key];
        return `<div class="quick">${values.map(v=>{
          const label=typeof v==='object'?v.label:v+'%';
          const value=typeof v==='object'?v.value:v;
          const active=s.downType==='%' && Number(s.down)===Number(value);
          return `<button type="button" class="${active?'active':''}" onclick="window.AM_CALC.quick('${key}',${value})">${label}</button>`
        }).join('')}</div>`
      }

      function downField(key, extras=''){
        const s=state[key], amount=downAmt(s.price,s.down,s.downType);
        return `<div class="full"><label>Down Payment</label><div class="row"><select class="mini" onchange="window.AM_CALC.update('${key}','downType',this.value)"><option value="$" ${s.downType==='$'?'selected':''}>$</option><option value="%" ${s.downType==='%'?'selected':''}>%</option></select><input type="number" value="${s.down}" onchange="window.AM_CALC.num('${key}','down',this.value)"></div>${extras}<div class="note">Calculated down payment: ${currency(amount)}</div></div>`
      }

      function termOptions(selected){
        return terms.map(t=>`<option value="${t}" ${Number(selected)===t?'selected':''}>${t} Years</option>`).join('')
      }

      function taxInsuranceBlock(tab){
        const s=state[tab];
        const defaultTaxes=calcAnnualTaxes(s.price);
        const defaultIns=calcAnnualInsurance(s.price);

        return `
          <div class="full">
            <label>Tax & Insurance</label>
            <div class="quick">
              <button type="button"
                class="${s.useDefaults ? 'active' : ''}"
                onclick="window.AM_CALC.toggleDefaults('${tab}','default')">
                Default (1.25% / 0.26%)
              </button>

              <button type="button"
                class="${!s.useDefaults ? 'active' : ''}"
                onclick="window.AM_CALC.toggleDefaults('${tab}','manual')">
                Enter Custom
              </button>
            </div>
          </div>

          ${s.useDefaults ? `
            <div class="full note">
              Property Tax (1.25%): ${currency(defaultTaxes)}/year<br>
              Insurance (0.26%): ${currency(defaultIns)}/year
            </div>
          ` : `
            <div>
              <label>Annual Property Tax</label>
              <input type="number" value="${clamp(s.taxes)}"
                onchange="window.AM_CALC.num('${tab}','taxes',this.value)">
            </div>

            <div>
              <label>Annual Property Insurance</label>
              <input type="number" value="${clamp(s.ins)}"
                onchange="window.AM_CALC.num('${tab}','ins',this.value)">
            </div>

            <div class="full note">
              Default: Tax ${currency(defaultTaxes)} / Insurance ${currency(defaultIns)}
            </div>
          `}
        `;
      }

      function renderConv(){
        const s=state.conv,
              down=downAmt(s.price,s.down,s.downType),
              loan=Math.max(clamp(s.price)-down,0),
              ltv=s.price>0?loan/s.price*100:0,
              pi=mp(loan,s.rate,s.term),
              taxes=getMonthlyTaxes('conv'),
              ins=getMonthlyInsurance('conv'),
              pmi=ltv>80?miMonthly(loan,s.mi):0,
              total=pi+taxes+ins+clamp(s.hoa)+pmi;

        const d20=clamp(s.price)*0.2,
              loan20=Math.max(clamp(s.price)-d20,0),
              pi20=mp(loan20,s.rate,s.term),
              total20=pi20+taxes+ins+clamp(s.hoa),
              monthlySavings=Math.max(total-total20,0),
              lifetime=Math.max(total*s.term*12-total20*s.term*12,0);

        const buydownRate=Math.max(clamp(s.rate)-1,0),
              buydownPi=mp(loan,buydownRate,s.term),
              buydownTotal=buydownPi+taxes+ins+pmi+clamp(s.hoa),
              buydownSavings=Math.max(total-buydownTotal,0);

        const helper=ltv<=80?'PMI is removed at 20% down or lower LTV.':`Increase to 20% down to remove PMI and potentially save about ${money2(monthlySavings)}/month.`;

        q('#conv').innerHTML=`<div class="grid"><div><div class="card"><div class="title">Conventional Calculator</div><div class="fields"><div><label>Purchase Price</label><input type="number" value="${s.price}" onchange="window.AM_CALC.num('conv','price',this.value)"></div><div><label>Mortgage Term</label><select onchange="window.AM_CALC.num('conv','term',this.value)">${termOptions(s.term)}</select></div>${downField('conv',quickButtons('conv',[5,10,15,{value:20,label:'20% Most Popular'},25])+`<div class="helper">${helper}</div>`)}<div><label>Interest Rate (%)</label><input type="number" step="0.01" value="${s.rate}" onchange="window.AM_CALC.num('conv','rate',this.value)"></div><div><label>Mortgage Insurance Rate (%)</label><input type="number" step="0.01" value="${s.mi}" onchange="window.AM_CALC.num('conv','mi',this.value)"></div><div><label>Monthly HOA</label><input type="number" value="${s.hoa}" onchange="window.AM_CALC.num('conv','hoa',this.value)"></div>${taxInsuranceBlock('conv')}<div class="full note">${ltv<=80?'Your LTV is 80% or less, so PMI is not included.':`Estimated LTV: ${percent(ltv)}`}</div></div></div></div><div><div class="card dark"><div class="sub">Estimated Monthly Payment</div><div class="big">${currency(total)}</div></div><div class="card">${rr('Down Payment',currency(down))}${rr('Loan Amount',currency(loan))}${rr('Principal & Interest',money2(pi))}${rr('Monthly Taxes',money2(taxes))}${rr('Monthly Insurance',money2(ins))}${rr('Monthly HOA',money2(clamp(s.hoa)))}${rr('Monthly PMI',money2(pmi))}${rr('Estimated Savings at 20% Down',money2(monthlySavings))}</div><div class="card"><div class="title" style="font-size:20px">Selected Down Payment vs 20% Down Comparison</div><div class="compare"><div class="soft"><div style="font-weight:800;margin-bottom:8px">${s.downType==='%'?s.down+'% Down':'Selected Down Payment'}</div>${rr('Down Payment',currency(down))}${rr('Loan Amount',currency(loan))}${rr('Monthly PMI',money2(pmi))}${rr('Monthly Payment',money2(total))}</div><div class="soft"><div style="font-weight:800;margin-bottom:8px">20% Down</div>${rr('Down Payment',currency(d20))}${rr('Loan Amount',currency(loan20))}${rr('Monthly PMI',money2(0))}${rr('Monthly Payment',money2(total20))}</div></div><div class="green"><div style="font-weight:800;margin-bottom:8px;color:#166534">Why 20% Down Matters</div>${rr('Monthly Savings',money2(monthlySavings))}${rr('Extra Paid Over Loan Term with Selected Down Payment',currency(lifetime))}</div><div class="blue"><div style="font-weight:800;margin-bottom:8px;color:#1d4ed8">1% Rate Buydown Illustration</div>${rr('Current Rate',percent(s.rate))}${rr('Illustrative Buydown Rate',percent(buydownRate))}${rr('Estimated Payment at Buydown Rate',money2(buydownTotal))}${rr('Estimated Monthly Savings',money2(buydownSavings))}</div></div>${leadBlock('conv')}</div></div>`;
      }

      function renderFha(){
        const s=state.fha,
              down=downAmt(s.price,s.down,s.downType),
              base=Math.max(clamp(s.price)-down,0),
              ufmip=base*0.0175,
              financed=base+ufmip,
              pi=mp(financed,s.rate,s.term),
              taxes=getMonthlyTaxes('fha'),
              ins=getMonthlyInsurance('fha'),
              monthlyMip=miMonthly(base,s.mip),
              total=pi+taxes+ins+clamp(s.hoa)+monthlyMip;

        q('#fha').innerHTML=`<div class="grid"><div><div class="card"><div class="title">FHA Calculator</div><div class="fields"><div><label>Purchase Price</label><input type="number" value="${s.price}" onchange="window.AM_CALC.num('fha','price',this.value)"></div><div><label>Mortgage Term</label><select onchange="window.AM_CALC.num('fha','term',this.value)">${termOptions(s.term)}</select></div>${downField('fha',quickButtons('fha',[3.5]))}<div><label>Interest Rate (%)</label><input type="number" step="0.01" value="${s.rate}" onchange="window.AM_CALC.num('fha','rate',this.value)"></div><div><label>Annual MIP Rate (%)</label><input type="number" step="0.01" value="${s.mip}" onchange="window.AM_CALC.num('fha','mip',this.value)"></div><div><label>Monthly HOA</label><input type="number" value="${s.hoa}" onchange="window.AM_CALC.num('fha','hoa',this.value)"></div>${taxInsuranceBlock('fha')}</div></div></div><div><div class="card dark"><div class="sub">Estimated Monthly FHA Payment</div><div class="big">${currency(total)}</div></div><div class="card">${rr('Down Payment',currency(down))}${rr('Base Loan Amount',currency(base))}${rr('Up-Front MIP (1.75%)',money2(ufmip))}${rr('Amount Financed',currency(financed))}${rr('Principal & Interest',money2(pi))}${rr('Monthly Taxes',money2(taxes))}${rr('Monthly Insurance',money2(ins))}${rr('Monthly HOA',money2(clamp(s.hoa)))}${rr('Monthly Mortgage Insurance',money2(monthlyMip))}</div>${leadBlock('fha')}</div></div>`;
      }

      function renderVa(){
        const s=state.va,
              down=downAmt(s.price,s.down,s.downType),
              feeRate=down>=clamp(s.price)*0.05?1.5:(s.firstUse==='yes'?2.15:3.3),
              base=Math.max(clamp(s.price)-down,0),
              fee=base*feeRate/100,
              financed=base+fee,
              pi=mp(financed,s.rate,s.term),
              taxes=getMonthlyTaxes('va'),
              ins=getMonthlyInsurance('va'),
              total=pi+taxes+ins+clamp(s.hoa);

        q('#va').innerHTML=`<div class="grid"><div><div class="card"><div class="title">VA Calculator</div><div class="fields"><div class="full"><label>First Time VA Loan?</label><select onchange="window.AM_CALC.update('va','firstUse',this.value)"><option value="yes" ${s.firstUse==='yes'?'selected':''}>Yes</option><option value="no" ${s.firstUse==='no'?'selected':''}>No</option></select></div><div><label>Type of Service</label><select onchange="window.AM_CALC.update('va','service',this.value)"><option value="regular" ${s.service==='regular'?'selected':''}>Regular Military</option><option value="guard" ${s.service==='guard'?'selected':''}>Reserves / National Guard</option></select></div><div><label>Mortgage Term</label><select onchange="window.AM_CALC.num('va','term',this.value)">${termOptions(s.term)}</select></div>${downField('va')}<div><label>Purchase Price</label><input type="number" value="${s.price}" onchange="window.AM_CALC.num('va','price',this.value)"></div><div><label>Interest Rate (%)</label><input type="number" step="0.01" value="${s.rate}" onchange="window.AM_CALC.num('va','rate',this.value)"></div><div><label>Monthly HOA</label><input type="number" value="${s.hoa}" onchange="window.AM_CALC.num('va','hoa',this.value)"></div>${taxInsuranceBlock('va')}<div class="full note">Estimated VA funding fee rate: ${percent(feeRate)}</div></div></div></div><div><div class="card dark"><div class="sub">Estimated Monthly VA Payment</div><div class="big">${currency(total)}</div></div><div class="card">${rr('Down Payment',currency(down))}${rr('Base Loan Amount',currency(base))}${rr('VA Funding Fee',money2(fee))}${rr('Amount Financed',currency(financed))}${rr('Principal & Interest',money2(pi))}${rr('Monthly Taxes',money2(taxes))}${rr('Monthly Insurance',money2(ins))}${rr('Monthly HOA',money2(clamp(s.hoa)))}</div>${leadBlock('va')}</div></div>`;
      }

      function renderAff(){
        const s=state.aff,
              monthlyIncome=clamp(s.income)/12,
              maxDebt=monthlyIncome*clamp(s.dti)/100,
              housing=Math.max(maxDebt-clamp(s.debts),0),
              r=clamp(s.rate)/100/12,
              n=clamp(s.term)*12;

        let roughLoan=0;
        roughLoan=r===0?housing*n:housing*((Math.pow(1+r,n)-1)/(r*Math.pow(1+r,n)));
        const roughHome=roughLoan+clamp(s.down);

        const defaultTaxesPreview = calcAnnualTaxes(roughHome);
        const defaultInsurancePreview = calcAnnualInsurance(roughHome);

        const annualTaxes = s.useDefaults ? defaultTaxesPreview : clamp(s.taxes);
        const annualInsurance = s.useDefaults ? defaultInsurancePreview : clamp(s.ins);
        const taxes=annualTaxes/12;
        const ins=annualInsurance/12;

        const availPI=Math.max(housing-taxes-ins,0);

        let adjustedLoan=0;
        adjustedLoan=r===0?availPI*n:availPI*((Math.pow(1+r,n)-1)/(r*Math.pow(1+r,n)));
        const adjustedHome=adjustedLoan+clamp(s.down);

        const defaultTaxes = defaultTaxesPreview;
        const defaultIns = defaultInsurancePreview;

      function renderPayoff(){
        const s = state.payoff,
              loanAmount = clamp(s.loanAmount),
              rate = clamp(s.rate),
              term = clamp(s.term),
              extraPayment = clamp(s.extraPayment),
              payEveryTwoWeeks = s.payEveryTwoWeeks === 'yes',
              monthlyRate = rate / 100 / 12,
              totalMonths = term * 12,
              regularPayment = mp(loanAmount, rate, term),
              biweeklyExtraMonthly = payEveryTwoWeeks ? regularPayment / 12 : 0,
              totalExtraMonthly = extraPayment + biweeklyExtraMonthly,
              newMonthlyPayment = regularPayment + totalExtraMonthly;

        function payoffScenario(extraMonthly){
          let balance = loanAmount;
          let months = 0;
          let interestPaid = 0;
          const payment = regularPayment + extraMonthly;

          if(loanAmount <= 0 || payment <= 0){
            return {months:0, interestPaid:0};
          }

          while(balance > 0 && months < 1200){
            const interest = balance * monthlyRate;
            let principal = payment - interest;

            if(principal <= 0){
              return {months:1200, interestPaid:Infinity};
            }

            if(principal > balance){
              principal = balance;
            }

            balance -= principal;
            interestPaid += interest;
            months++;
          }

          return {months, interestPaid};
        }

        const originalInterest = (regularPayment * totalMonths) - loanAmount;
        const faster = payoffScenario(totalExtraMonthly);
        const interestSavings = Math.max(originalInterest - faster.interestPaid, 0);
        const monthsSaved = Math.max(totalMonths - faster.months, 0);
        const yearsSaved = monthsSaved / 12;
        const payoffYears = faster.months / 12;

        const message = payEveryTwoWeeks
          ? 'Every 2 weeks adds the equivalent of one extra mortgage payment per year.'
          : 'Turn on every 2 weeks to add the equivalent of one extra mortgage payment per year.';

        q('#payoff').innerHTML = `

                      <option value="yes" ${s.payEveryTwoWeeks==='yes'?'selected':''}>Yes — Every 2 Weeks</option>
                      <option value="no" ${s.payEveryTwoWeeks==='no'?'selected':''}>No — Monthly Only</option>
                    </select>
                    <div class="note">${message}</div>
                  </div>

                  <div class="full">
                    <div class="quick">
                      <button type="button" onclick="window.AM_CALC.setExtraPayoff(100)">$100 Extra</button>
                      <button type="button" onclick="window.AM_CALC.setExtraPayoff(250)">$250 Extra</button>
                      <button type="button" onclick="window.AM_CALC.setExtraPayoff(500)">$500 Extra</button>
                      <button type="button" onclick="window.AM_CALC.setExtraPayoff(1000)">$1,000 Extra</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div>
              <div class="card dark">
                <div class="sub">Estimated New Payoff Time</div>
                <div class="big">${payoffYears.toFixed(1)} Years</div>
              </div>

              <div class="card">
                ${rr('Regular Monthly Payment', money2(regularPayment))}
                ${rr('Extra Monthly Payment', money2(extraPayment))}
                ${rr('Every 2 Weeks Benefit', money2(biweeklyExtraMonthly) + '/mo equivalent')}
                ${rr('Total Monthly Payoff Amount', money2(newMonthlyPayment))}
                ${rr('Original Payoff Time', totalMonths + ' Months')}
                ${rr('New Payoff Time', faster.months + ' Months')}
                ${rr('Years Saved', yearsSaved.toFixed(1) + ' Years')}
                ${rr('Interest Savings', currency(interestSavings))}
              </div>

              <div class="green">
                <div style="font-weight:800;margin-bottom:8px;color:#166534">Payoff Sooner Strategy</div>
                Extra payments go directly toward principal. Paying every 2 weeks can equal one extra payment per year and may reduce both interest and loan term.
              </div>

              ${leadBlock('payoff')}
            </div>
          </div>
        `;
      }


      function renderGoal(){
        const s = state.goal;

        function parseMonth(value){
          const parts = String(value || '').split('-');
          const y = Number(parts[0]);
          const m = Number(parts[1]);
          if(!Number.isFinite(y) || !Number.isFinite(m)) return null;
          return new Date(y, m - 1, 1);
        }

        function monthDiff(fromDate, toDate){
          if(!fromDate || !toDate) return 0;
          return (toDate.getFullYear() - fromDate.getFullYear()) * 12 + (toDate.getMonth() - fromDate.getMonth());
        }

        function addMonths(date, months){
          return new Date(date.getFullYear(), date.getMonth() + months, 1);
        }

        function requiredPayment(balance, annualRate, months){
          const b = clamp(balance), n = Math.max(1, Math.floor(clamp(months,1))), r = clamp(annualRate)/100/12;
          if(r === 0) return b / n;
          return (b * r) / (1 - Math.pow(1 + r, -n));
        }

        function monthLabel(date){
          if(!date) return '';
          return date.toLocaleDateString('en-US',{month:'long',year:'numeric'});
        }

        const startDate = parseMonth(s.startMonth),
              targetDate = parseMonth(s.targetMonth),
              today = new Date(),
              currentMonth = new Date(today.getFullYear(), today.getMonth(), 1),
              originalMonths = clamp(s.term) * 12,
              maturityDate = startDate ? addMonths(startDate, originalMonths) : null,
              elapsedMonths = Math.max(monthDiff(startDate, currentMonth), 0),
              remainingOriginalMonths = Math.max(monthDiff(currentMonth, maturityDate), 1),
              monthsToGoal = Math.max(monthDiff(currentMonth, targetDate), 1),
              currentBalance = clamp(s.currentBalance),
              rate = clamp(s.rate),
              regularPayment = requiredPayment(currentBalance, rate, remainingOriginalMonths),
              goalPayment = requiredPayment(currentBalance, rate, monthsToGoal),
              extraNeeded = Math.max(goalPayment - regularPayment, 0),
              originalPayoffLabel = maturityDate ? monthLabel(maturityDate) : '',
              goalLabel = targetDate ? monthLabel(targetDate) : '',
              currentLabel = monthLabel(currentMonth),
              goalYears = monthsToGoal / 12,
              monthsFaster = Math.max(remainingOriginalMonths - monthsToGoal, 0),
              yearsFaster = monthsFaster / 12;

        const targetNote = monthsToGoal <= 1
          ? 'Goal date must be after the current month. Calculator is using at least 1 month.'
          : `Based on current month ${currentLabel} and target payoff ${goalLabel}.`;

        q('#goal').innerHTML = `
          <div class="grid">
            <div>
              <div class="card">
                <div class="title">Personal Goal Payoff Calculator</div>
                <div class="note" style="margin-top:-6px;margin-bottom:14px">Personalized goal: enter loan start month, current loan balance, rate, original term, and the month/year client wants the mortgage paid off.</div>

                <div class="fields">
                  <div>
                    <label>Loan Start Month / Year</label>
                    <input type="month" value="${s.startMonth}" onchange="window.AM_CALC.update('goal','startMonth',this.value)">
                  </div>

                  <div>
                    <label>Original Loan Term</label>
                    <select onchange="window.AM_CALC.num('goal','term',this.value)">
                      ${termOptions(s.term)}
                    </select>
                  </div>

                  <div>
                    <label>Current Loan Balance</label>
                    <input type="number" value="${s.currentBalance}" onchange="window.AM_CALC.num('goal','currentBalance',this.value)">
                  </div>

                  <div>
                    <label>Interest Rate (%)</label>
                    <input type="number" step="0.01" value="${s.rate}" onchange="window.AM_CALC.num('goal','rate',this.value)">
                  </div>

                  <div class="full">
                    <label>Goal Payoff Month / Year</label>
                    <input type="month" value="${s.targetMonth}" onchange="window.AM_CALC.update('goal','targetMonth',this.value)">
                    <div class="note">Example: January 2020 loan start and July 2030 payoff goal.</div>
                  </div>
                </div>
              </div>
            </div>

            <div>
              <div class="card dark">
                <div class="sub">Extra Payment Needed</div>
                <div class="big">${money2(extraNeeded)}/mo</div>
                <div class="note" style="color:#cbd5e1">Additional amount above estimated regular payment.</div>
              </div>

              <div class="card">
                ${rr('Current Balance', currency(currentBalance))}
                ${rr('Estimated Regular Payment', money2(regularPayment))}
                ${rr('Goal Monthly Payment', money2(goalPayment))}
                ${rr('Extra Needed Every Month', money2(extraNeeded))}
                ${rr('Months to Goal', monthsToGoal + ' Months')}
                ${rr('Goal Payoff Time', goalYears.toFixed(1) + ' Years')}
                ${rr('Original Estimated Payoff', originalPayoffLabel)}
                ${rr('Years Faster Than Original Schedule', yearsFaster.toFixed(1) + ' Years')}
              </div>

              <div class="blue">
                <div style="font-weight:800;margin-bottom:8px;color:#1d4ed8">Personal Goal</div>
                ${targetNote} This shows the estimated extra principal payment needed each month to reach the payoff goal.
              </div>

              ${leadBlock('goal')}
            </div>
          </div>
        `;
      }

      function renderAll(){
        renderConv();
        renderFha();
        renderVa();
        renderAff();
        renderDti();
        renderDscr();
        renderRefi();
        renderBuydown();
        renderPayoff();
        renderGoal();
      }

      window.AM_CALC={
        update:(tab,key,val)=>{state[tab][key]=val;renderAll()},
        num:(tab,key,val)=>{state[tab][key]=val===''?'':Number(val);renderAll()},
        quick:(tab,val)=>{state[tab].downType='%';state[tab].down=Number(val);renderAll()},
        toggleDefaults:(tab,val)=>{
          state[tab].useDefaults = val === 'default';
          if(state[tab].useDefaults && state[tab].price){
            state[tab].taxes = calcAnnualTaxes(state[tab].price);
            state[tab].ins = calcAnnualInsurance(state[tab].price);
          }
          renderAll();
        },
        setExtraPayoff:(val)=>{state.payoff.extraPayment=Number(val);renderAll()}
      };

      qa('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{
        qa('.tab-btn').forEach(b=>b.classList.remove('active'));
        qa('.panel').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        q('#'+btn.dataset.tab).classList.add('active');
      }));

      renderAll();
    })();
  </script>
</div>
